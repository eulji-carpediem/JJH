<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }

        body {
            margin : 0px;
            padding : 0px;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <h1 id="title"> 제목 영역</h1>
            <div class="firstBox box"> 첫 번째 박스</div>
            <div class="special box"> 두 번째 박스(특별)</div>
            <div class="box"> 세 번째 박스</div>
        </section>

        <section>
            <ul>
                <li> 첫 번째 목록 </li>
                <li class="special"> 두 번째 목록 (특별) </li>
                <li> 세 번째 목록 </li>
                <li> 네 번째 목록 </li>
            </ul>
        </section>

        <section>
            <input type="text" placeholder="택스트 입력">
            <input type="email" placeholder="이메일 입력">
            <button> 일반 버튼</button>
        </section>

        <section>
            <button> ID로 선택</button>
            <button> 클래스로 선택</button>
            <button> 태그로 선택</button>
            <button> 특별 클래스 선택</button>
        </section>

        <section>
            <button> 첫 번째만 선택</button>
            <button> 모든 박스 선택</button>
            <button> 복합 선택자</button>
            <button> 입력 필드 선택</button>
        </section>
    </main>
</body>

</html>
