<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0px;
            padding: 0px;
        }

        main {
            width: 50%;
            margin: 0 auto;
        }

        .box {
            width: 100%;
            height: 60px;
            border: 2px solid rgb(224, 224, 224);
            background: rgba(222, 222, 222, 0.562);
            margin-top: 15px;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item {
            width: 100%;
            height: 40px;
            margin-top: 5px;
            margin-bottom: 0px;
            border: none;
            border-left: 3px solid blue;
            background: rgba(155, 155, 155, 0.562);

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .highlights {
            background: rgba(255, 255, 0, 0.476);
            border-color: rgb(248, 211, 2)
        }

        button {
            width: 150px;
            height: 40px;
            margin: 20px 20px 0px 0px;
            border: none;
            color: white;
            background-color: rgb(29, 66, 251);
        }

        button:hover {
            background-color: rgba(29, 66, 251, 0.493);
        }
    </style>
</head>

<body>
    <main>
        <div class="box"> 첫 번째 박스</div>
        <div class="box"> 두 번째 박스</div>
        <div class="box highlights"> 세 번째 박스(하이라이트)</div>

        <p class="item"> 첫 번째 아이템</p>
        <p class="item"> 두 번째 아이템</p>
        <p class="item"> 세 번째 아이템</p>
        <p class="item"> 네 번째 아이템</p>

        <p class="highlights"> 하이라이트 된 문단입니다.</p>

        <button onclick=allBoxSelect()> 모든 박스 선택</button>
        <button onClick=allItemSelect()> 모든 아이템 선택</button>
        <button onclick=highlightsSelect()> 하이라이트 요소들 선택 </button>
    </main>
    <script>
        function allBoxSelect() {
            const $allbox = document.getElementsByClassName('box');
            [...$allbox].forEach((box, boxIndex) => {
                box.style.background = "#fb1d1d7e";
                box.innerText = `선택된 ${boxIndex+1}번째 박스 입니다.`;
            })
        }

        function allItemSelect() {
            const $allitem = document.getElementsByClassName('item');
            [...$allitem].forEach((item, itemIndex) => {
                item.style.borderLeftColor="green"
                item.style.background = "#1dfb2c7e";
                item.innerText = `선택된 ${itemIndex+1}번째 아이템입니다.`
            })
        }

        function highlightsSelect() {
            const $highlights = document.getElementsByClassName('highlights');
            [...$highlights].forEach((high, highIndex) => {
                high.style.background = "#fb371d7e";
                high.innerText = `${high.innerText} (수정됨)`;
            })
        }
    </script>
</body>

</html>
