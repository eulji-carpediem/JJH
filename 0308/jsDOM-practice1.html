<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin : 0px;
            padding :0px;
        }

        main {
            width : 30%;
            margin : 0 auto;
        }

        #first-box, #second-box {
            width  : 100%;
            height : 50px;
            border: 2px solid rgba(128, 128, 128, 0.517);
            border-radius : 5px;

            display: flex;
            align-items: center;
            justify-content: center;
            margin-top : 20px;
        }

        button {
            margin-right : 10px;
            background: rgba(16, 16, 255, 0.712);
            color : white;
            width : 30%;
            height : 40px;
            border: none;
            border-radius: 3px;
        }
        button:hover {
            background-color: rgba(16, 16, 255, 0.476);
        }
    </style>
</head>
<body>
    <main>
        <div id="first-box"> 첫 번째 박스</div>

        <div id="second-box"> 두 번째 박스</div>

        <p id="message"> 메시지가 표시되는 공간</p>

        <button onclick=firstBoxClick() id="fisrt-box-select"> 첫 번째 박스 선택</button>

        <button onclick=secondBoxClick()  id="second-box-select"> 두 번째 박스 선택</button>

        <button onclick=messageBoxClick() id="message-select"> 메시지 선택</button>
    </main>

    <script>
        function firstBoxClick() {
            const first = document.getElementById("first-box");
            first.style.background = 'red';
            first.innerText = "첫 번쨰 박스를 선택했습니다."
        }

        function secondBoxClick() {
            const second = document.getElementById("second-box");
            second.style.background = "#10ff8f79"
            second.innerText = "두 번째 박스를 선택했습니다."

        }

        function messageBoxClick() {
            const message = document.getElementById("message"); 
            message.innerText = "ID로 요소를 성공적으로 찾았습니다.";
            message.style.fontSize = "20px";
            message.style.color = "blue";
        }
    </script>
</body>
</html>
