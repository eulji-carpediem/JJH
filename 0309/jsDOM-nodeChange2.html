    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0px;
            padding: 0px;
        }


        main {
            width: 50%;
            padding-left: 10px;
            border: 2px solid blue;
            padding: 20px;

            margin-top: 50px;
            margin-left: 10px;
        }

        .change {
            /* width: 100%; */

            display: flex;
            align-items: center;
            background: red;
            border: none;
            margin-top: 5px;
            color: white;
            padding-left: 10px;

        }

        section {
            margin: 15px 0px 0px 10px;
        }

        .newBox1 {
            background: green;
            color: white;
            padding-left: 10px;
            padding-right: 10px;
        }
    </style>
</head>

<body>

    <main id="main-ct">
        <div class="change box1"> 교체될 자식 1</div>
        <div class="change box2"> 교체될 자식 2</div>
        <div class="change box3"> 교체될 자식 3</div>
    </main>

    <section>
        <button onclick="totalChange('.box1', 'div', '새로운 첫번쨰 자식');"> 첫 번째 교체 </button>
        <button onclick="totalChange('.box2', 'span', '새로운 두번째 자식');"> 두 번째 교체 </button>
        <button onclick="totalChange('.box3', 'div', '<b>새로운 세번째 자식</b>');"> 세 번째 교체 </button>
    </section>


    <script>
        function totalChange(tag, newtag, newText) {
            const $total = document.querySelector('#main-ct');
            const $totalbox = document.querySelector(`${tag}`);
            const $newbox = document.createElement(`${newtag}`);
            $newbox.innerHTML = `${newText}`;
            $newbox.classList.add('newBox1');

            $total.replaceChild($newbox, $totalbox);
        }
