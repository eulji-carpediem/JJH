<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0px;
            padding: 0px;
        }


        main {
            width: 50%;
            padding-left: 10px;
            border: 2px solid blue;
            padding: 20px;

            margin-top: 50px;
            margin-left: 10px;
        }

        .change {
            /* width: 100%; */
            /* height: 50px; */

            display: flex;
            align-items: center;
            background: red;
            border: none;
            margin-top: 5px;
            color: white;
            padding-left: 10px;

        }

        section {
            margin: 15px 0px 0px 10px;
        }

        .newBox1 {
            background: green;
            color: white;
            padding-left: 10px;
            padding-right: 10px;
        }
    </style>
</head>

<body>

    <main id="main-ct">
        <div class="change box1"> 교체될 자식 1</div>
        <div class="change box2"> 교체될 자식 2</div>
        <div class="change box3"> 교체될 자식 3</div>
    </main>

    <section>
        <button onclick="firstChange();"> 첫 번째 교체 </button>
        <button onclick="secondChange();"> 두 번째 교체 </button>
        <button onclick="thirdChange();"> 세 번째 교체 </button>
    </section>


    <script>
        function firstChange() {
            const $first = document.querySelector('#main-ct');

            const $firstbox1 = document.querySelector('.box1');
            const $newbox1 = document.createElement('div');
            $newbox1.innerText = "새로운 첫 번째 자식"
            $newbox1.classList.add('newBox1');

            $first.replaceChild($newbox1, $firstbox1);
        }

        function secondChange() {
            const $first = document.querySelector('#main-ct');

            const $firstbox1 = document.querySelector('.box2');
            const $newbox1 = document.createElement('span');
            $newbox1.innerText = "새로운 두 번째 자식"
            $newbox1.classList.add('newBox1');

            $first.replaceChild($newbox1, $firstbox1);
        }

        function thirdChange() {
            const $first = document.querySelector('#main-ct');

            const $firstbox1 = document.querySelector('.box3');
            const $newbox1 = document.createElement('div');
            $newbox1.innerHTML = "<b> 새로운 세 번째 자식 </b>";
            $newbox1.classList.add('newBox1');
            $newbox1.style.fontSize = "25px";

            $first.replaceChild($newbox1, $firstbox1);
        }
    </script>
</body>

</html>
