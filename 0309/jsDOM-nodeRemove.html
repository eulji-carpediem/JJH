<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0px;
            padding: 0px;
        }

        main {
            width: 80%;
            padding: 20px;
            border: 3px solid black;
            margin: 20px 0px 0px 20px;
        }

        button {
            margin-top: 20px;
            margin-left: 10px;
        }

        .list {
            margin-top: 5px;
            height: 50px;
            width: 100%;
            background: rgba(0, 72, 255, 0.545);

            display: flex;
            align-items: center;
            padding: 10px;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <main>
        <div class="list box1"> 삭제할 항목 1</div>
        <div class="list box2"> 삭제할 항목 2</div>
        <div class="list box3"> 삭제할 항목 3</div>
        <div class="list box4"> 삭제할 항목 4</div>
    </main>

    <button onclick="totalDelete('box1');"> 첫 번째 삭제 </button>
    <button onclick="totalDelete('box2');"> 두 번째 삭제 </button>
    <button onclick="totalDelete('box3');"> 세 번째 삭제 </button>
    <button onclick="totalDelete('box4');"> 마지막 삭제 </button>

        function totalDelete(className) {
            const $total = document.querySelector(`.${className}`);
            $total.remove();
