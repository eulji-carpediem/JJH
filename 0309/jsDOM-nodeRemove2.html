        body {

            padding: 0px;

        main {
            width: 80%;
            padding: 20px;
            border: 3px solid rgba(255, 0, 17, 0.486);

            margin-top: 20px;

        .list {
            margin-top: 5px;
            height: 50px;

    <button onclick="totalDelete('.box3');"> 세 번째 자식 삭제 </button>
