<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin : 0px;
            padding : 0px;
        }

        body {
            box-sizing: border-box;
        }

        section {
            width  :120px;
            height : 170px;
            border-radius: 8px;
            background-color: #FFB9B9;
            
            margin : 16px 0px 0px 16px;

            display : flex;
            justify-content: end;
            align-items: flex-end;
        }

        div {
            width : 24px;
            height: 24px;
            border-radius: 1000px;
            background-color: #D9D9D9;
            margin : 0px 8px 8px 0px;
        }

        p {
            margin-left : 24px;
            margin-top : 8px;
            font-size: 12px;
            font-weight: 400;
            width : 100px;
        }
    </style>
</head>
<body>
    <section>
        <div></div>
    </section>
    <p>나른한 점심시간, 밖에서 밥먹기 </p>
</body>
</html>
