<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section {
        width : 332px;
        height : 100px;
        top : 16px;
        left : 16px;
        border-radius: 8px;
        background-color: #FFE4E4;

        display :flex;
        gap : 8px;

        }

        .left-ct {
            width : 160px;
            height : 100px;
            border-radius: 8px;
            background-color: #FFB9B9;
        }

        .right-ct {
            display : flex;
            flex-direction: column;
            gap : 8px;
        }

        p {
            margin : 0px;
        }

        .hi {
            width : 96px;
            height: 19px;
            background-color: #FFB9B9;
            font-size: 12px;
            font-weight: 400;
            display : flex;
            color : #FFFFFF;
            justify-content: center;
            margin-top : 8px;
        }

        .goodday {
            font-size: 16px;
            font-weight: 400;
        }

        .weather {
            font-size: 14px;
            font-weight: 400;
            color : #8B8B8B;
        }
    </style>
</head>
<body>
    <section>
        <div class="left-ct"></div>
        <div class="right-ct">
            <p class="hi"> 반가워요! </p>
            <p class="goodday"> 좋은하루보내세요! </p>
            <p class="weather"> 날씨가 좋네요! </p>
        </div> 
    </section>
</body>
</html>
