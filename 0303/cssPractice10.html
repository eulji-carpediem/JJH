<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            box-sizing: border-box;
        }

        section {
            width : 320px ;
            height : 80px;
            display : flex;
            gap : 16px;
            align-items: center;
            background-color: #CA785C;
            /* padding-left : 16px; */
        }

        p {
            font-size: 24px;
            font-weight: 700;
            color: #FFFFFF;
        }

        section > p:first-child {
            margin-left : 16px;
        }
    </style>
</head>

<body>
    <section>
        <p> 봄</p>
        <p> 여름 </p>
        <p> 가을 </p>
        <p> 겨울 </p>
    </section>
</body>

</html>
