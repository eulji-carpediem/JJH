<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            box-sizing: border-box;
        }

        section {
            width : 160px;
            height : 240px;
            /* border-radius: 4px; */

            display : grid;
            grid-template-rows: 172px 68px;
            margin : 16px 0px 0px 16px;
        }

        section > div:first-child {
            background-image: url('8css.svg');
            border-radius: 4px 4px 0px 0px;
        } 

        section > div:nth-child(2) {
            background-color: #CA785C;
            display: flex;
            flex-direction: column;
            gap : 16px;
        }

        div > p {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.5%;
            color : #FFFFFF;
            margin-top: 8px;
            margin-left: 8px;
        }

        article {
            display : flex;
            gap : 29px;
            margin : 0px 8px 0px 8px;
    
        }

        article > p {
            font-size: 14px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.5%;
        }
    </style>
</head>

<body>
    <section>
        <div></div>
        <div>
            <p> 인테리어란? </p>
            <article>
                <p> 김작가 </p>
                <p> 2024.01.01</p>
            </article>
        </div>
    </section>
</body>

</html>
