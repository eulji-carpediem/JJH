<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            box-sizing: border-box;
        }

        section {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-left: 16px;
        }

        .top-login {
            font-size: 24px;
            font-weight: 700;
        }

        .id,
        .password {
            display: flex;
            flex-direction: column;
            gap : 8px;
        }

        label {
            font-size: 16px;
            font-weight: 400;
        }

        input {
            width : 278px;
            height : 40px;
            border-radius: 8px;
            border : 1px solid #C3C3C3;
        }
    </style>
</head>

<body>
    <section>
        <p class="top-login"> 로그인</p>

        <div class="id">
            <label> 아이디 </label>
            <input>
        </div>

        <div class="password">
            <label> 비밀번호 </label>
            <input>
        </div>

        <p class="bottom-login"> 로그인 </p>
    </section>
</body>

</html>
