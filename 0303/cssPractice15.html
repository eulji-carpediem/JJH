<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            box-sizing: border-box;
        }

        section {
            display : flex;
            flex-direction: column;
            width : 280px;
            margin-left : 16px;
            gap : 24px;
        }

        .login {
            font-size: 24px;
            font-weight: 700;
        }

        .login-ct {
            display : flex;
            flex-direction: column;
            gap : 8px;
        }

        .id, .password {
            font-size: 16px;
            font-weight: 400;
        }

        input {
            height: 40px;
            border-radius: 8px;
            border : 1px solid #C3C3C3;
        }

        button {
            height: 48px;
            border-radius: 8px;
            border : 0px;
            background-color: #17B75E;

            color : #FFFFFF;
            font-size: 20px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <form>
        <section>
            <p class="login"> 로그인 </p>

            <div class="login-ct">
                <label class="id">아이디</label>
                <input type="text">
            </div>

            <div class="login-ct">
                <label class="password">비밀번호</label>
                <input type="text">
            </div>
            <button> 로그인</button>
        </section>
    </form>

</body>

</html>
