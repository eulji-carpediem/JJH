<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section {
        width : 332px;
        height : 100px;
        top : 16px;
        left : 16px;
        border-radius: 8px;
        background-color: #FFE4E4;

        display :flex;

        }

        .left-ct {
            width : 160px;
            height : 100px;
            border-radius: 8px;
            background-color: #FFB9B9;
        }

        .right-ct {
            display : flex;
            flex-direction: column;
            gap : 8px;
        }

        p {
            margin : 0px;
        }
    </style>
</head>
<body>
    <section>
        <div class="left-ct"></div>
        <div class="right-ct">
            <p> 반가워요! </p>
            <p> 좋은하루보내세요! </p>
            <p> 날씨가 좋네요! </p>
        </div> 
    </section>
</body>
</html>
