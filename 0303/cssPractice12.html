<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            box-sizing: border-box;
        }

        section {
            margin : 16px 0px 0px 16px;
            width : 320px;
            height : 320px;
            background-image: url('12css.svg');

            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        div {
            width : 32px;
            height: 32px;
            border-radius: 1000px;
        }

        p {
            font-size: 24px;
            font-weight: 700;
            color : #FFFFFF;
        }

        .first {
            background-color: #E3FF92;
        }

        .second {
            background-color: #92F8FF;
        }

        .third {
            background-color: #FF9292;
        }

        article {
            display : flex;
            justify-content: space-between;
            margin : 16px;
        }
    </style>
</head>

<body>
    <section>
        <article>
        <p> 인테리어 디자인</p>
        <div class="first"></div>
        </article>

        <article>
        <div class="second"></div>
        <div class="third"></div>
        </article>
    </section>
</body>

</html>
