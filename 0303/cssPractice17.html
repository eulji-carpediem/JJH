<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }
        section {
            width : 300px;
            height : 250px;
            top : 16px;
            left : 16px;
            border-radius: 8px;

            background-color: #FFB9B9;
            background-image: url('17css.svg');
            display : flex;
            align-items: end;
            z-index: 10;
            border-radius: 8px;
        }

        div {
            width : 300px;
            height : 56px;
            z-index: 20;
            background: #00000099;
            border-radius: 0px 0px 8px 8px;
            
            display: flex;
            flex-direction: column;
            gap : 5px;

        }

        p {
            margin : 0px;
            padding : 0px;
            margin-left : 8px;
        }

        .p1 {
            font-size: 12px;
            font-weight: 700;
            color : #FFFFFF;
            margin-top: 8px;
        } 

        .p2 {
            font-size: 12px;
            font-weight: 700;
            color : #D1D1D1
        }
    </style>
</head>
<body>
    <section>
        <div>
            <p class="p1"> 새로운 시작!</p>
            <p class="p2"> 김작가 </p>
        </div>
    </section>
</body>
</html>
