<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }
        div {
            width : 297px;
            height : 35px;
            top : 16px;
            left : 16px;

            /* padding : 8px 16px 8px 16px; */

            display : flex;
            align-items: center;
            justify-content: center;
            gap : 16px;

            background-color: #FFB9B9;
            color : #FFFFFF;
            font-size: 16px;
            font-style: bold;
            font-weight: 700;

        }

        span {
            width : 4px;
            height : 4px;
            background-color: #D9D9D9;
            border-radius: 9999px;
        }
    </style>
</head>
<body>
    <div> 웹툰홈  <span></span> 요일별웹툰 <span></span> 베스트도전</div>
</body>
</html>
