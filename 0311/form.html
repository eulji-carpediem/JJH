<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .userForm-ct {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: 700;
        }

        input[type="text"],
        input[type="email"],
        select {
            height: 40px;
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder {
            color: rgba(128, 128, 128, 0.578);
            padding: 3px;
            font-size: 15px;
            font-weight: 700;
        }

        select {
            padding: 10px;
        }

        .textarea-add {
            font-size: 15px;
            color: rgba(128, 128, 128, 0.578);
        }

        .inf-agree-ct {
            margin-left: 10px;
        }

        .fc {
            outline: 2px dashed lightblue;
            background: rgba(22, 135, 172, 0.226);
        }

        input[type="submit"] {
            width: 100px;
            height: 30px;
            background: rgba(28, 153, 132, 0.411);
            border: none;
        }
    </style>
</head>

<body>
    <h1> 사용자 입력 양식 이벤트 연습하기</h1>
    <form action="" method="get" name="userInf">
        <div class="userForm-ct">
            <label> 이름 </label>
            <input type="text" name="name" placeholder="이름을 입력하세요" required>

            <label> 이메일</label>
            <input type="email" name="email" placeholder="example@domai.com">

            <label> 성별</label>
            <div>
                <input type="radio" name="gender" id="male"> <label for="male">남자</label>
                <input type="radio" name="gender" id="female"> <label for="female">여자</label>
            </div>

            <label> 참여 일자 선택</label>
            <select id="date" name="date">
                <option value="default" selected disabled> -- 날짜 선택 -- </option>
                <option value="0311"> 2026-03-11</option>
                <option value="0312"> 2026-03-12</option>
                <option value="0313"> 2026-03-13</option>
                <option value="0314"> 2026-03-14</option>
                <option value="0315"> 2026-03-15</option>
                <option value="0316"> 2026-03-16</option>
            </select>

            <label> 요청사항</label>
            <textarea type="text" name="textA" rows="6" id="textct" style="resize: none;" maxlength="500"> 요청 사항을 입력하세요 </textarea>
            <div><span class="textarea-add">0</span>/500자</div>

            <div class="inf-agree-ct">
                <input type="checkbox" name="perCheck" checked>
                <span> 개인정보 수집에 동의합니다. </span>
            </div>

            <input type="submit" name="submit" value="신청하기">
        </div>
    </form>

    <script>
        const $form = document.forms.userInf;
        const $submit = $form.submit;
        const $textarea = $form.textA;
        let  $count = document.querySelector('.textarea-add');

        console.log($textarea);
        $form.addEventListener("submit", (e) => {
            e.preventDefault();
            const $date = $form.date;
            if ($date.value === "default") {
                alert("날짜를 선택하세요");
            }
        })

        $form.addEventListener('focusin', (e) => e.target.classList.add('fc'));
        $form.addEventListener('focusout', (e) => e.target.classList.remove('fc'));

        $textarea.addEventListener("input", (e) => {
            const $check = $textarea.value;
            $count.innerText = $check.length;

        })

    </script>
</body>

</html>
