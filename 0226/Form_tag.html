<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend> 기본 정보</legend>
        
        <label> 아이디 : </label>
        <input type="text" minlength="4" maxlength="12"> <br> <br>
    
        
        <label> 비밀번호 : </label>
        <input type="password"> <br> <br>

        <label> 이메일 : </label>
        <input type="email"> <br> <br>
    </fieldset>

    <fieldset>
        <legend> 추가 정보 </legend>
        <label> 직업 :</label>
        <select>
            <option selected> 선택하세요</option>
            <option> 학생 </option>
            <option> 회사원 </option>
            <option> 자영업자 </option>
            <option> 전문직 </option>
            <option> 기타 </option>
        </select> <br> <br>

        <label> 관심분야 : </label> <br>
        
        <input type="checkbox" id="music">
        <label for="music"> 음악</label> 
        <input type="checkbox" id="movie">
        <label for="movie"> 영화</label> 
        <input type="checkbox" id="ehrtj">
        <label for="ehrtj"> 독서</label> 
        <input type="checkbox" id="dnsehd">
        <labe for="dnsehd"> 운동</label> 
        <input type="checkbox" id="travel">
        <label for="travel"> 여행</label> <br><br>
    </fieldset>

    <fieldset>
        <legend> 자기소개</legend> <br>

        <label> 자기소개 : </label> <br>
        <textarea cols="50" rows="5"></textarea> <br> <br>

        <label> 프로필 사진 : </label>
        <input type="file">
    </fieldset> <br>

    <input type="submit" value="가입하기"> 
    <input type="reset" value="다시 작성">
</body>
</html>
